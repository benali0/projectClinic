spring.application.name=Clinique
spring.datasource.url=jdbc:mysql://localhost:3306/clinicdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.servlet.context-path=/clinique
server.port=8082
# WebSocket
spring.websocket.support=true

# Seed demo data on startup (disable in prod with: app.seed.enabled=false)
app.seed.enabled=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
