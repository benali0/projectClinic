<nav class="medecin-navbar navbar navbar-expand-lg sticky-top">
  <div class="container">
    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/medecin/dashboard">
      <div class="nav-icon text-white d-flex align-items-center justify-content-center">
        <i class="bi bi-stethoscope fs-4"></i>
      </div>
      <div class="brand-text">
        <span class="brand-name">Mediterranean Clinic</span>
        <span class="brand-role">Espace Médecin</span>
      </div>
    </a>

    <!-- Menu -->
    <div class="collapse navbar-collapse" [class.show]="isMenuOpen">
      <ul class="navbar-nav mx-auto align-items-center gap-1">
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)" (click)="navigateTo('/medecin/dashboard')">
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)" (click)="navigateTo('/medecin/rendezvous')">
             Mes Rendez-vous
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)" (click)="navigateTo('/medecin/calendrier')">
             Calendrier
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)" (click)="navigateTo('/medecin/patients')">
             Mes Patients
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)" (click)="navigateTo('/medecin/dossiers')">
             Dossiers Médicaux
          </a>
        </li>
      </ul>

      <!-- Actions -->
      <div class="d-flex align-items-center gap-3">
        <!-- Notifications -->
        <div class="dropdown notification-dropdown" #notificationDropdown>
          <button 
            class="btn-notification" 
            type="button"
            (click)="toggleNotifications($event)"
            [class.has-unread]="unreadCount > 0"
            title="Notifications">
            <i class="bi bi-bell-fill"></i>
            <span class="notification-badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
          </button>

          <div class="dropdown-menu notification-menu" [class.show]="isNotificationsOpen">
            <div class="notification-header">
              <div class="d-flex align-items-center gap-2">
                <i class="bi bi-bell-fill text-primary fs-5"></i>
                <h6 class="m-0 fw-bold">Notifications</h6>
                <span class="badge bg-primary rounded-pill" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
              </div>
              <div class="notification-actions">
                <button class="btn-action btn-mark-all" (click)="markAllAsRead($event)" *ngIf="unreadCount > 0" title="Tout marquer comme lu">
                  <i class="bi bi-check2-all"></i>
                </button>
              </div>
            </div>

            <div class="notification-list" *ngIf="notifications.length > 0; else noNotifications">
              <div *ngFor="let notif of notifications" class="notification-item"
                   [class.unread]="notif.statut === 'NON_LUE'"
                   (click)="onNotificationClick(notif)">
                <div class="notification-icon" [class]="'type-' + (notif.type | lowercase)">
                  <i class="bi" [class]="getNotificationIcon(notif.type)"></i>
                </div>
                <div class="notification-content">
                  <p class="notification-text">{{ notif.message }}</p>
                  <span class="notification-time">
                    <i class="bi bi-clock me-1"></i>{{ notif.dateEnvoi | date:'dd/MM/yyyy HH:mm' }}
                  </span>
                </div>
                <div class="unread-indicator" *ngIf="notif.statut === 'NON_LUE'">
                  <i class="bi bi-circle-fill"></i>
                </div>
              </div>
            </div>

            <ng-template #noNotifications>
              <div class="notification-empty">
                <i class="bi bi-bell-slash"></i>
                <p>Aucune notification</p>
              </div>
            </ng-template>

            <div class="notification-footer" *ngIf="notifications.length > 0">
              <a href="javascript:void(0)" (click)="viewAllNotifications($event)">
                <i class="bi bi-arrow-right-circle me-1"></i>Voir toutes les notifications
              </a>
            </div>
          </div>
        </div>

        <!-- Déconnexion -->
        <button type="button" class="btn-logout" (click)="logout()" title="Déconnexion">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>
</nav>
