services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: clinicdb
      MYSQL_USER: clinic
      MYSQL_PASSWORD: clinicpass
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./Clinique_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/clinicdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: clinic
      SPRING_DATASOURCE_PASSWORD: clinicpass
    depends_on:
      - db
    ports:
      - "8082:8082"

  frontend:
    build:
      context: ./clinique_frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  db_data: